name: Deploy Area42 to AWS

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  AWS_ACCOUNT_ID: "074693480758"

  ECS_CLUSTER: area42-simple-cluster

  API_ECR_REPOSITORY: area42-simple-api
  API_SERVICE: area42-simple-api-service
  API_TASK_DEFINITION: area42-simple-api-task
  API_CONTAINER_NAME: area42-simple-api

  WEB_ECR_REPOSITORY: area42-simple-web
  WEB_SERVICE: area42-simple-web-service
  WEB_TASK_DEFINITION: area42-simple-web-task
  WEB_CONTAINER_NAME: area42-simple-web

jobs:
  deploy:
    name: Build, push and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        run: |
          API_IMAGE=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$API_ECR_REPOSITORY:latest
          docker build -f Dockerfile.Api -t $API_IMAGE .
          docker push $API_IMAGE
          echo "API_IMAGE=$API_IMAGE" >> $GITHUB_ENV

      - name: Build and push Web image
        run: |
          WEB_IMAGE=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$WEB_ECR_REPOSITORY:latest
          docker build -f Dockerfile.Web -t $WEB_IMAGE .
          docker push $WEB_IMAGE
          echo "WEB_IMAGE=$WEB_IMAGE" >> $GITHUB_ENV

      - name: Download API task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $API_TASK_DEFINITION \
            --query taskDefinition \
            > api-task-definition.json

      - name: Render API task definition
        id: render-api-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: api-task-definition.json
          container-name: ${{ env.API_CONTAINER_NAME }}
          image: ${{ env.API_IMAGE }}

      - name: Deploy API service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-api-task.outputs.task-definition }}
          service: ${{ env.API_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Download Web task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $WEB_TASK_DEFINITION \
            --query taskDefinition \
            > web-task-definition.json

      - name: Render Web task definition
        id: render-web-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: web-task-definition.json
          container-name: ${{ env.WEB_CONTAINER_NAME }}
          image: ${{ env.WEB_IMAGE }}

      - name: Deploy Web service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-web-task.outputs.task-definition }}
          service: ${{ env.WEB_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
