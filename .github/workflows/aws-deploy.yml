name: Build and deploy Area42 web and API

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: eu-central-1
  DOTNET_VERSION: 10.0.x
  ECS_CLUSTER: AREA42-FULL-CLUSTER
  WEB_ECS_SERVICE: area42-full-web-service
  API_ECS_SERVICE: area42-full-api-service
  WEB_TASK_FAMILY: area42-full-web-task
  API_TASK_FAMILY: area42-full-api-task
  WEB_ECR_REPOSITORY: area42-full-web
  API_ECR_REPOSITORY: area42-full-api
  WEB_CONTAINER_NAME: area42-web
  API_CONTAINER_NAME: area42-api

jobs:
  verify:
    name: Verify web and API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore Area42-1.slnx

      - name: Build solution
        run: dotnet build Area42-1.slnx --configuration Release --no-restore

      - name: Build web container
        run: docker build --file Dockerfile.Web --tag area42-full-web:${{ github.sha }} .

      - name: Build API container
        run: docker build --file Dockerfile.ApiService --tag area42-full-api:${{ github.sha }} .

  publish-web:
    name: Publish web image
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push web image
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${WEB_ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build --file Dockerfile.Web --tag "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          docker tag "${IMAGE_URI}" "${REGISTRY}/${WEB_ECR_REPOSITORY}:latest"
          docker push "${REGISTRY}/${WEB_ECR_REPOSITORY}:latest"
          echo "uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

  publish-api:
    name: Publish API image
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${API_ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build --file Dockerfile.ApiService --tag "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          docker tag "${IMAGE_URI}" "${REGISTRY}/${API_ECR_REPOSITORY}:latest"
          docker push "${REGISTRY}/${API_ECR_REPOSITORY}:latest"
          echo "uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

  deploy-web:
    name: Deploy web service
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/codex/AREA42'
    needs: publish-web
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy web image
        env:
          SERVICE: ${{ env.WEB_ECS_SERVICE }}
          EXPECTED_TASK_FAMILY: ${{ env.WEB_TASK_FAMILY }}
          IMAGE_URI: ${{ needs.publish-web.outputs.image }}
        run: |
          CURRENT_TASK_DEFINITION=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${SERVICE}" \
            --query "services[0].taskDefinition" \
            --output text)

          if [[ "${CURRENT_TASK_DEFINITION}" != *"task-definition/${EXPECTED_TASK_FAMILY}:"* ]]; then
            echo "Service ${SERVICE} does not use task family ${EXPECTED_TASK_FAMILY}."
            exit 1
          fi

          aws ecs describe-task-definition \
            --task-definition "${CURRENT_TASK_DEFINITION}" \
            --query "taskDefinition" > current-task-definition.json

          jq \
            --arg image "${IMAGE_URI}" \
            --arg container "${WEB_CONTAINER_NAME}" \
            'del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions |= map(
                if .name == $container then .image = $image else . end
              )' current-task-definition.json > next-task-definition.json

          TASK_DEFINITION_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://next-task-definition.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${SERVICE}" \
            --task-definition "${TASK_DEFINITION_ARN}" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${SERVICE}"

  deploy-api:
    name: Deploy API service
    if: >-
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/codex/AREA42'
    needs: publish-api
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy API image
        env:
          SERVICE: ${{ env.API_ECS_SERVICE }}
          EXPECTED_TASK_FAMILY: ${{ env.API_TASK_FAMILY }}
          IMAGE_URI: ${{ needs.publish-api.outputs.image }}
        run: |
          CURRENT_TASK_DEFINITION=$(aws ecs describe-services \
            --cluster "${ECS_CLUSTER}" \
            --services "${SERVICE}" \
            --query "services[0].taskDefinition" \
            --output text)

          if [[ "${CURRENT_TASK_DEFINITION}" != *"task-definition/${EXPECTED_TASK_FAMILY}:"* ]]; then
            echo "Service ${SERVICE} does not use task family ${EXPECTED_TASK_FAMILY}."
            exit 1
          fi

          aws ecs describe-task-definition \
            --task-definition "${CURRENT_TASK_DEFINITION}" \
            --query "taskDefinition" > current-task-definition.json

          jq \
            --arg image "${IMAGE_URI}" \
            --arg container "${API_CONTAINER_NAME}" \
            'del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions |= map(
                if .name == $container then .image = $image else . end
              )' current-task-definition.json > next-task-definition.json

          TASK_DEFINITION_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://next-task-definition.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${SERVICE}" \
            --task-definition "${TASK_DEFINITION_ARN}" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${SERVICE}"
