name: Build and deploy Area42 to ECS

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: eu-west-1
  DOTNET_VERSION: 10.0.x
  PROJECT: Area42-1.Web/Area42-1.Web.csproj
  ECR_REPOSITORY: area42-web
  CONTAINER_NAME: area42-web

jobs:
  verify:
    name: Build and verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.PROJECT }}"

      - name: Build
        run: dotnet build "${{ env.PROJECT }}" --configuration Release --no-restore

      - name: Publish
        run: dotnet publish "${{ env.PROJECT }}" --configuration Release --no-build --output ./publish-check

      - name: Build Docker image
        run: docker build --tag area42-web:${{ github.sha }} .

  publish-image:
    name: Publish image to ECR
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build --tag "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

  deploy-test:
    name: Deploy green test service
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/develop'
    needs: publish-image
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create new task definition revision
        id: task
        env:
          CLUSTER: ${{ secrets.AWS_ECS_TEST_CLUSTER }}
          SERVICE: ${{ secrets.AWS_ECS_TEST_SERVICE }}
          IMAGE_URI: ${{ needs.publish-image.outputs.image }}
          AREA42_THEME: green
        run: |
          CURRENT_TASK_DEFINITION=$(aws ecs describe-services \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}" \
            --query "services[0].taskDefinition" \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "${CURRENT_TASK_DEFINITION}" \
            --query "taskDefinition" > current-task-definition.json

          jq \
            --arg image "${IMAGE_URI}" \
            --arg container "${CONTAINER_NAME}" \
            --arg theme "${AREA42_THEME}" \
            'del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions |= map(
                if .name == $container then
                  .image = $image
                  | .environment = (
                      (.environment // [])
                      | map(select(.name != "AREA42_THEME"))
                      + [{"name": "AREA42_THEME", "value": $theme}]
                    )
                else .
                end
              )' current-task-definition.json > next-task-definition.json

          TASK_DEFINITION_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://next-task-definition.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "arn=${TASK_DEFINITION_ARN}" >> "${GITHUB_OUTPUT}"

      - name: Deploy test service
        env:
          CLUSTER: ${{ secrets.AWS_ECS_TEST_CLUSTER }}
          SERVICE: ${{ secrets.AWS_ECS_TEST_SERVICE }}
          TASK_DEFINITION_ARN: ${{ steps.task.outputs.arn }}
        run: |
          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --task-definition "${TASK_DEFINITION_ARN}"

          aws ecs wait services-stable \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}"

  deploy-production:
    name: Deploy blue production service
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: publish-image
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create new task definition revision
        id: task
        env:
          CLUSTER: ${{ secrets.AWS_ECS_PRODUCTION_CLUSTER }}
          SERVICE: ${{ secrets.AWS_ECS_PRODUCTION_SERVICE }}
          IMAGE_URI: ${{ needs.publish-image.outputs.image }}
          AREA42_THEME: blue
        run: |
          CURRENT_TASK_DEFINITION=$(aws ecs describe-services \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}" \
            --query "services[0].taskDefinition" \
            --output text)

          aws ecs describe-task-definition \
            --task-definition "${CURRENT_TASK_DEFINITION}" \
            --query "taskDefinition" > current-task-definition.json

          jq \
            --arg image "${IMAGE_URI}" \
            --arg container "${CONTAINER_NAME}" \
            --arg theme "${AREA42_THEME}" \
            'del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )
            | .containerDefinitions |= map(
                if .name == $container then
                  .image = $image
                  | .environment = (
                      (.environment // [])
                      | map(select(.name != "AREA42_THEME"))
                      + [{"name": "AREA42_THEME", "value": $theme}]
                    )
                else .
                end
              )' current-task-definition.json > next-task-definition.json

          TASK_DEFINITION_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://next-task-definition.json \
            --query "taskDefinition.taskDefinitionArn" \
            --output text)

          echo "arn=${TASK_DEFINITION_ARN}" >> "${GITHUB_OUTPUT}"

      - name: Deploy production service
        env:
          CLUSTER: ${{ secrets.AWS_ECS_PRODUCTION_CLUSTER }}
          SERVICE: ${{ secrets.AWS_ECS_PRODUCTION_SERVICE }}
          TASK_DEFINITION_ARN: ${{ steps.task.outputs.arn }}
        run: |
          aws ecs update-service \
            --cluster "${CLUSTER}" \
            --service "${SERVICE}" \
            --task-definition "${TASK_DEFINITION_ARN}"

          aws ecs wait services-stable \
            --cluster "${CLUSTER}" \
            --services "${SERVICE}"
